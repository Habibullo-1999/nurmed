name: Deploy

# Ручной запуск с выбором ветки
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        default: 'main'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1. Клонируем код (для тестов перед деплоем)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Сборка и тесты Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./... -v

      # 3. Деплой на сервер через SSH
      - name: Deploy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            BRANCH="${{ github.event.inputs.branch }}"

            # Добавляем github.com в known_hosts, чтобы git fetch не падал
            mkdir -p ~/.ssh
            ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts 2>/dev/null

            # Обновляем код репозитория
            git config --global --add safe.directory /opt/app/backend/nurmed
            cd /opt/app/backend/nurmed || { echo "Directory not found"; exit 1; }

            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH

            echo "Deploying branch: $BRANCH"
            echo "Last commits:"
            git log -3 --oneline

            # Запускаем docker compose из директории с docker-compose.yml
            cd /opt/app
            docker compose down
            docker compose up -d --build
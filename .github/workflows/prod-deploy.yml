name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        default: main
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1. Клонируем код (для тестов перед деплоем)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2. Сборка и тесты Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./... -v

      - name: Validate deploy secrets
        run: |
          [ -n "${SERVER_IP}" ] || { echo "SERVER_IP is missing"; exit 1; }
          [ -n "${SERVER_USER}" ] || { echo "SERVER_USER is missing"; exit 1; }
          [ -n "${SSH_PRIVATE_KEY}" ] || { echo "SSH_PRIVATE_KEY is missing"; exit 1; }
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      # 3. Деплой на сервер через SSH
      - name: Deploy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            git config --global --add safe.directory /opt/app/backend/nurmed
            
            BRANCH="${{ github.event.inputs.branch }}"
            cd /opt/app/backend/nurmed || exit 1

            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH
            
            cd ../.. || exit 1

            echo "Deploying branch: $BRANCH"
            echo "Last commits:"
            git log -3 --oneline

            docker compose down
            docker compose up -d --build